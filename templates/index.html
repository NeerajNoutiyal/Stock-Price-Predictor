<!DOCTYPE html>
<html>
<head>
    <title>Stock Price Predictor</title>
</head>
<body>

<h1>📈 Stock Price Predictor</h1>

<form action="/predict" method="POST">

    <label>Enter Stock Symbol:</label><br><br>

    <input
        type="text"
        name="ticker"
        placeholder="Example: AAPL"
        required
    >

    <br><br>

    <button type="submit">Predict</button>

</form>

{% if prediction %}

<h2>{{ prediction }}</h2>

{% endif %}

</body>
</html>
